    <style>
        /* Music Page Specific Styles */
        body.balenjera-music {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .music-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 15px;
        }

        .page-header h1 i {
            color: #ff6b9d;
            margin-right: 10px;
        }

        .page-header p {
            color: #a5b4cb;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Mood Categories */
        .mood-categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .mood-cat-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-cat-btn.active {
            background: linear-gradient(135deg, #5e5bff, #ff6b9d);
            border-color: transparent;
        }

        .mood-cat-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Now Playing Section */
        .now-playing {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .now-playing-title {
            color: #a5b4cb;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .now-playing-title i {
            color: #ff6b9d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .now-playing-content {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .now-playing-video {
            flex: 2;
            min-width: 280px;
        }

        .now-playing-video iframe {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            border: none;
        }

        .now-playing-info {
            flex: 1;
            min-width: 200px;
        }

        .now-playing-info h3 {
            color: white;
            margin-bottom: 8px;
        }

        .now-playing-info p {
            color: #a5b4cb;
            margin-bottom: 15px;
        }

        .now-playing-badge {
            display: inline-block;
            background: rgba(94, 91, 255, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #5e5bff;
        }

        /* Music Grid */
        .music-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .music-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .music-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(94, 91, 255, 0.3);
        }

        .music-thumbnail {
            position: relative;
            height: 180px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .music-card:hover .play-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #5e5bff, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            transition: transform 0.3s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }

        .music-info {
            padding: 15px;
        }

        .music-title {
            font-size: 1rem;
            font-weight: 600;
            color: white;
            margin-bottom: 5px;
        }

        .music-artist {
            font-size: 0.8rem;
            color: #a5b4cb;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .music-description {
            font-size: 0.75rem;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .mood-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            color: #ff6b9d;
            margin-top: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #a5b4cb;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .now-playing-content {
                flex-direction: column;
            }
            
            .music-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

        let currentMood = "all";
        let currentlyPlaying = null;

        // Load music on page load
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎵 Music page loaded');
            loadMusic();
            setupMoodListeners();
        });

        function setupMoodListeners() {
            const moodBtns = document.querySelectorAll('.mood-cat-btn');
            moodBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    moodBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMood = btn.getAttribute('data-mood');
                    loadMusic();
                });
            });
        }

        function loadMusic() {
            const musicGrid = document.getElementById('musicGrid');
            
            let musicToShow = musicDatabase.all;
            if (currentMood !== 'all') {
                musicToShow = musicDatabase.all.filter(music => music.mood === currentMood);
            }
            
            if (musicToShow.length === 0) {
                musicGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-music"></i>
                        <p>No music in this mood category yet.</p>
                    </div>
                `;
                return;
            }
            
            musicGrid.innerHTML = musicToShow.map(music => `
                <div class="music-card" onclick="playMusic(${music.id})">
                    <div class="music-thumbnail" style="background-image: url('${music.thumbnail}')">
                        <div class="play-overlay">
                            <div class="play-btn">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                    </div>
                    <div class="music-info">
                        <h3 class="music-title">${escapeHtml(music.title)}</h3>
                        <div class="music-artist">
                            <i class="fas fa-user"></i> ${escapeHtml(music.artist)}
                        </div>
                        <p class="music-description">${escapeHtml(music.description)}</p>
                        <span class="mood-tag">${getMoodIcon(music.mood)} ${getMoodName(music.mood)}</span>
                    </div>
                </div>
            `).join('');
        }

        function playMusic(musicId) {
            const music = musicDatabase.all.find(m => m.id === musicId);
            if (!music) return;
            
            currentlyPlaying = music;
            
            // Show now playing section
            const nowPlayingSection = document.getElementById('nowPlayingSection');
            nowPlayingSection.style.display = 'block';
            
            // Update now playing content
            const nowPlayingContent = document.getElementById('nowPlayingContent');
            nowPlayingContent.innerHTML = `
                <div class="now-playing-video">
                    <iframe 
                        src="https://www.youtube.com/embed/${music.youtubeId}?autoplay=1&rel=0"
                        frameborder="0"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>
                <div class="now-playing-info">
                    <h3>${escapeHtml(music.title)}</h3>
                    <p><i class="fas fa-user"></i> ${escapeHtml(music.artist)}</p>
                    <p>${escapeHtml(music.description)}</p>
                    <span class="now-playing-badge">${getMoodIcon(music.mood)} ${getMoodName(music.mood)}</span>
                    </div>
            `;
            
            // Scroll to now playing section
            nowPlayingSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            
            // Save to recent music in localStorage
            saveToRecentMusic(music);
        }

        function saveToRecentMusic(music) {
            let recentMusic = JSON.parse(localStorage.getItem('balenjeraRecentMusic') || '[]');
            recentMusic = [music, ...recentMusic.filter(m => m.id !== music.id)];
            if (recentMusic.length > 10) recentMusic.pop();
            localStorage.setItem('balenjeraRecentMusic', JSON.stringify(recentMusic));
        }

        function getMoodIcon(mood) {
            const icons = {
                calm: "🌊",
                focus: "📚",
                meditation: "🧘",
                uplifting: "⭐",
                all: "🎵"
            };
            return icons[mood] || "🎵";
        }

        function getMoodName(mood) {
            const names = {
                calm: "Calm & Relaxing",
                focus: "Focus & Study",
                meditation: "Meditation",
                uplifting: "Uplifting",
                all: "All Music"
            };
            return names[mood] || mood;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
