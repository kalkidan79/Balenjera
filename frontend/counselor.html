<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balenjera 👩‍⚕️ | Counselor Dashboard - Student Wellness Alerts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Counselor Page Specific Styles */
        body.balenjera-counselor {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .counselor-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: white;
            margin-bottom: 15px;
        }

        .page-header h1 i {
            color: #72efdd;
            margin-right: 10px;
        }

        .page-header p {
            color: #a5b4cb;
            font-size: 1.1rem;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ff6b9d;
        }

        .stat-label {
            color: #a5b4cb;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-tab {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 24px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #5e5bff, #ff6b9d);
            border-color: transparent;
        }

        .filter-tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Cases Grid */
        .cases-grid {
            display: grid;
            gap: 20px;
        }

        .case-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            border-left: 5px solid;
            transition: all 0.3s;
        }

        .case-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .case-card.urgent {
            border-left-color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
        }

        .case-card.follow-up {
            border-left-color: #f39c12;
        }

        .case-card.resolved {
            border-left-color: #2ecc71;
            opacity: 0.7;
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }

        .case-student {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #5e5bff, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }

        .student-info h4 {
            color: white;
            margin-bottom: 4px;
        }

        .student-info .student-email {
            color: #a5b4cb;
            font-size: 0.8rem;
        }

        .case-badge {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .severity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .severity-badge.urgent {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }

        .severity-badge.follow-up {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
        }

        .severity-badge.resolved {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .case-date {
            color: #7f8c8d;
            font-size: 0.75rem;
        }

        .case-message {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }

        .case-message-label {
            color: #a5b4cb;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .case-message-text {
            color: white;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .case-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .resolve-btn {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.3);
            padding: 8px 20px;
            border-radius: 25px;
            color: #2ecc71;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .resolve-btn:hover {
            background: rgba(46, 204, 113, 0.4);
            transform: translateY(-2px);
        }

        .contact-btn {
            background: rgba(94, 91, 255, 0.2);
            border: 1px solid rgba(94, 91, 255, 0.3);
            padding: 8px 20px;
            border-radius: 25px;
            color: #5e5bff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .contact-btn:hover {
            background: rgba(94, 91, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #a5b4cb;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e1e2e;
            border-radius: 25px;
            max-width: 500px;
            width: 100%;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: white;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #a5b4cb;
            cursor: pointer;
        }

        .modal-body {
            color: #a5b4cb;
            line-height: 1.6;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .case-header {
                flex-direction: column;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body class="balenjera-counselor">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-hands-helping"></i>
                <span>Balen<span class="logo-highlight">jera</span></span>
                <span class="logo-badge">Counselor Portal</span>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="dashboard.html"><i class="fas fa-user-circle"></i> Dashboard</a>
                <div class="nav-buttons">
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="counselor-container">
        <div class="page-header">
            <h1><i class="fas fa-chalkboard-user"></i> Counselor Dashboard</h1>
            <p>Monitor student wellness flags and provide timely support</p>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalCases">0</div>
                <div class="stat-label">Total Flagged Cases</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="urgentCases">0</div>
                <div class="stat-label">⚠️ Urgent - Needs Immediate Attention</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="followUpCases">0</div>
                <div class="stat-label">🟡 Follow-up Needed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="resolvedCases">0</div>
                <div class="stat-label">✅ Resolved Cases</div>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">📋 All Cases</button>
            <button class="filter-tab" data-filter="urgent">🔴 Urgent</button>
            <button class="filter-tab" data-filter="follow-up">🟡 Follow-up</button>
            <button class="filter-tab" data-filter="resolved">✅ Resolved</button>
        </div>

        <!-- Cases Grid -->
        <div class="cases-grid" id="casesGrid">
            <div class="empty-state">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading cases...</p>
            </div>
        </div>
    </div>

    <!-- Contact Modal -->
    <div class="modal" id="contactModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-envelope"></i> Contact Student</h3>
                <button class="modal-close" onclick="closeContactModal()">&times;</button>
            </div>
            <div class="modal-body" id="contactModalBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer">
                <button class="resolve-btn" onclick="closeContactModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        let flaggedCases = [];
        let currentFilter = 'all';

        // Check authentication and role
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('👩‍⚕️ Counselor page loading...');
            
            const { isLoggedIn, userData } = checkAuth();
            
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }
            
            if (userData.role !== 'counselor') {
                alert('Access denied. This page is only for counselors.');
                window.location.href = 'dashboard.html';
                return;
            }
            
            // Load flagged cases
            await loadFlaggedCases();
            setupFilterListeners();
        });

        async function loadFlaggedCases() {
            try {
                const response = await fetch(`${API_BASE_URL}/flagged-cases`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('Failed to load cases');
                }
                
                const data = await response.json();
                flaggedCases = data.cases || [];
                
                updateStats();
                displayCases();
                
            } catch (error) {
                console.error('Error loading cases:', error);
                // Load demo cases for testing when backend is not fully ready
                loadDemoCases();
            }
        }

        function loadDemoCases() {
            // Demo cases for testing
            flaggedCases = [
                {
                    id: 1,
                    student_name: "Alex Tesfaye",
                    student_email: "alex@school.edu",
                    message: "I've been feeling really sad and lonely lately. I miss my family and can't focus on my studies.",
                    severity: "follow-up",
                    timestamp: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
                    resolved: false
                },
                {
                    id: 2,
                    student_name: "Sofia Mekonnen",
                    student_email: "sofia@school.edu",
                    message: "I'm struggling with exam anxiety. My heart races before every test and I can't sleep.",
                    severity: "follow-up",
                    timestamp: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000).toISOString(),
                    resolved: false
                },
                {
                    id: 3,
                    student_name: "Michael Abebe",
                    student_email: "michael@school.edu",
                    message: "I feel like giving up. Nothing matters anymore. I don't want to be here.",
                    severity: "urgent",
                    timestamp: new Date(Date.now() - 5 * 60 * 60 * 1000).toISOString(),
                    resolved: false
                }
            ];
            updateStats();
            displayCases();
        }

        function updateStats() {
            const total = flaggedCases.length;
            const urgent = flaggedCases.filter(c => c.severity === 'urgent' && !c.resolved).length;
            const followUp = flaggedCases.filter(c => c.severity === 'follow-up' && !c.resolved).length;
            const resolved = flaggedCases.filter(c => c.resolved).length;
            
            document.getElementById('totalCases').textContent = total;
            document.getElementById('urgentCases').textContent = urgent;
            document.getElementById('followUpCases').textContent = followUp;
            document.getElementById('resolvedCases').textContent = resolved;
        }

        function displayCases() {
            const casesGrid = document.getElementById('casesGrid');
            
            let filteredCases = flaggedCases;
            if (currentFilter === 'urgent') {
                filteredCases = flaggedCases.filter(c => c.severity === 'urgent' && !c.resolved);
            } else if (currentFilter === 'follow-up') {
                filteredCases = flaggedCases.filter(c => c.severity === 'follow-up' && !c.resolved);
            } else if (currentFilter === 'resolved') {
                filteredCases = flaggedCases.filter(c => c.resolved);
            }
            
            if (filteredCases.length === 0) {
                casesGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-check-circle"></i>
                        <p>No flagged cases in this category.</p>
                        <p style="font-size: 0.85rem;">Students who need support will appear here.</p>
                    </div>
                `;
                return;
            }
            
            casesGrid.innerHTML = filteredCases.map(caseItem => `
                <div class="case-card ${caseItem.severity} ${caseItem.resolved ? 'resolved' : ''}">
                    <div class="case-header">
                        <div class="case-student">
                            <div class="student-avatar">
                                ${getInitials(caseItem.student_name)}
                            </div>
                            <div class="student-info">
                                <h4>${escapeHtml(caseItem.student_name)}</h4>
                                <div class="student-email">${escapeHtml(caseItem.student_email)}</div>
                            </div>
                        </div>
                        <div class="case-badge">
                            <span class="severity-badge ${caseItem.severity}">
                                ${caseItem.severity === 'urgent' ? '🔴 URGENT' : '🟡 Follow-up'}
                            </span>
                            <span class="case-date">${formatDate(caseItem.timestamp)}</span>
                        </div>
                    </div>
                    <div class="case-message">
                        <div class="case-message-label">
                            <i class="fas fa-comment-dots"></i> Student's Message
                        </div>
                        <div class="case-message-text">
                            "${escapeHtml(caseItem.message)}"
                        </div>
                    </div>
                    <div class="case-actions">
                        ${!caseItem.resolved ? `
                            <button class="resolve-btn" onclick="resolveCase(${caseItem.id})">
                                <i class="fas fa-check"></i> Mark as Resolved
                            </button>
                            <button class="contact-btn" onclick="contactStudent('${caseItem.student_email}', '${caseItem.student_name}')">
                                <i class="fas fa-envelope"></i> Contact Student
                            </button>
                        ` : `
                            <span style="color: #2ecc71;">
                                <i class="fas fa-check-circle"></i> Resolved on ${formatDate(caseItem.resolved_at)}
                            </span>
                        `}
                    </div>
                </div>
            `).join('');
        }

        async function resolveCase(caseId) {
            if (!confirm('Mark this case as resolved? The student will no longer appear in your urgent list.')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/flagged-cases/${caseId}/resolve`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });
                
                if (response.ok) {
                    // Update local data
                    const caseIndex = flaggedCases.findIndex(c => c.id === caseId);
                    if (caseIndex !== -1) {
                        flaggedCases[caseIndex].resolved = true;
                        flaggedCases[caseIndex].resolved_at = new Date().toISOString();
                    }
                    updateStats();
                    displayCases();
                    showToast('Case marked as resolved', 'success');
                } else {
                    throw new Error('Failed to resolve');
                }
            } catch (error) {
                console.error('Error resolving case:', error);
                // Demo mode - update locally
                const caseIndex = flaggedCases.findIndex(c => c.id === caseId);
                if (caseIndex !== -1) {
                    flaggedCases[caseIndex].resolved = true;
                    flaggedCases[caseIndex].resolved_at = new Date().toISOString();
                }
                updateStats();
                displayCases();
                showToast('Case marked as resolved (Demo mode)', 'success');
            }
        }

        function contactStudent(email, name) {
            const modal = document.getElementById('contactModal');
            const modalBody = document.getElementById('contactModalBody');
            
            modalBody.innerHTML = `
                <p><strong>Student:</strong> ${escapeHtml(name)}</p>
                <p><strong>Email:</strong> ${escapeHtml(email)}</p>
                <div style="background: rgba(94, 91, 255, 0.1); padding: 15px; border-radius: 15px; margin-top: 15px;">
                    <p><i class="fas fa-phone"></i> <strong>Suggested Response:</strong></p>
                    <p style="margin-top: 10px; font-style: italic;">"Hi ${name}, I saw that you've been going through a difficult time. I want you to know that I'm here to support you. Please feel free to visit the counselor's office or reply to this message when you're ready to talk."</p>
                </div>
                <div style="margin-top: 20px;">
                    <p><i class="fas fa-building"></i> <strong>In-person Support:</strong></p>
                    <p>Counselor's office is located in Building A, Room 101. Open Monday-Friday, 9 AM - 4 PM.</p>
                </div>
            `;
            
            modal.classList.add('active');
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.remove('active');
        }

        function setupFilterListeners() {
            const filterTabs = document.querySelectorAll('.filter-tab');
            filterTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    filterTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentFilter = tab.getAttribute('data-filter');
                    displayCases();
                });
            });
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 60) {
                return `${diffMins} minute${diffMins !== 1 ? 's' : ''} ago`;
            } else if (diffHours < 24) {
                return `${diffHours} hour${diffHours !== 1 ? 's' : ''} ago`;
            } else {
                return date.toLocaleDateString();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#2ecc71' : '#e74c3c'};
                color: white;
                padding: 12px 20px;
                border-radius: 10px;
                z-index: 9999;
                animation: slideInRight 0.3s ease;
            `;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOutRight {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
